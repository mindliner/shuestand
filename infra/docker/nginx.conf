limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;

# Only throttle mutating methods on write endpoints. Empty keys are not accounted,
# so GET/HEAD on deposit/withdrawal status polling stay on the read limiter.
map $request_method $api_write_limit_key {
    default "";
    POST $binary_remote_addr;
    PUT $binary_remote_addr;
    PATCH $binary_remote_addr;
    DELETE $binary_remote_addr;
}

limit_req_zone $api_write_limit_key zone=api_writes_per_ip:10m rate=2r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/api/v1/(sessions|deposits|withdrawals) {
        limit_req zone=api_writes_per_ip burst=10 nodelay;
        limit_req_status 429;
        client_max_body_size 1m;

        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        limit_req zone=api_per_ip burst=60 nodelay;
        limit_req_status 429;
        client_max_body_size 1m;

        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
