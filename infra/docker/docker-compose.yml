services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shuestand
      POSTGRES_USER: shuestand
      POSTGRES_PASSWORD: Wenaco.41hema
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shuestand"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgres://shuestand:Wenaco.41hema@postgres:5432/shuestand
    volumes:
      - cashu-data:/data/cashu
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "8872:80"
    restart: unless-stopped

volumes:
  postgres-data:
  cashu-data:
